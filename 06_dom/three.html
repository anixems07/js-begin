<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM</title>
</head>
<body style="background-color: black; color: #fff;">
    
</body>
<script>
    const div= document.createElement('div')
    console.log(div);
    div.className= "main";
    div.id= "main-div";
    div.setAttribute('title', 'main_div') //It takes input in key value pair
    div.style.backgroundColor= "red"
    div.style.padding="12px"
    // div.innerText="DOM manipulation" //It first selects the element and then overwrites the content of the element, so it have to make two round trips to the DOM
    const txt= document.createTextNode("DOM manipulation")
    div.appendChild(txt)

    document.body.appendChild(div)
</script>
</html>
